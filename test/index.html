<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Selection</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <div>
        <label for="txt_owner">Select Owner:</label>
        <select id="txt_owner">
            <option value="">Loading Owners...</option>
        </select>
    </div>

    <script>
        $(document).ready(function() {
            $.ajax({
                url: "/api/getOwnersNeedingAttention", // IMPORTANT: This needs a running backend
                method: "GET",
                dataType: "json",
                success: function(data) {
                    var ownerDropdown = $("#txt_owner");
                    ownerDropdown.empty();

                    ownerDropdown.append($("<option>", {
                        value: "",
                        text: "Select Owner"
                    }));

                    $.each(data, function(index, owner) {
                        ownerDropdown.append($("<option>", {
                            value: owner.owner_id,
                            text: owner.owner_name
                        }));
                    });
                },
                error: function(xhr, status, error) {
                    console.error("Error fetching owners:", status, error);
                    $("#txt_owner").empty().append($("<option>", { text: "Error loading owners" }));
                    alert("Failed to load the list of owners.");
                }
            });
        });
    </script>
</body>
</html>
