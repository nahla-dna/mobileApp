{% extends 'home.html' %}

{% block title %}Edit Profile - Javan Rentals{% endblock %}

{% block content %}
<!-- Edit Profile Content -->
<div class="login-container">
    <div class="login-box" style="max-width: 600px;">
        <div class="login-header">EDIT PROFILE</div>
        
        <form method="post" style="padding: 30px;">
            {% csrf_token %}
            
            <div class="profile-avatar" style="margin-bottom: 30px;">
                <div class="avatar-circle">{{ user.username|first|upper }}</div>
                <p style="color: #666; margin-top: 10px; font-size: 14px;">{{ user.username }}</p>
            </div>
            
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" placeholder="Enter your first name">
            </div>
            
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" placeholder="Enter your last name">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" placeholder="Enter your email" required>
            </div>
            
            <div class="info-box">
                <p style="margin: 0; font-size: 13px; color: #666;">
                    <strong>Note:</strong> Username cannot be changed. Contact support if you need to change your username.
                </p>
            </div>
            
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 25px;">
                <button type="submit" class="login-btn">Save Changes</button>
                <a href="{% url 'base:profile' %}" class="login-btn" style="background-color: #999; text-decoration: none; display: inline-block; line-height: 1;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
