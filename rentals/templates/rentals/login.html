{% extends "rentals/base.html" %}
{% block content %}

<div class="auth-box">
    <h2>Log in</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>

    <p>Don't have account? <a href="{% url 'signup' %}">Sign up</a></p>
</div>

{% endblock %}
