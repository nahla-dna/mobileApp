{% extends "rentals/base.html" %}
{% block content %}

<div class="auth-box">
    <h2>Create an account</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign up</button>
    </form>

    <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</div>

<style>
.auth-box {
    max-width: 420px;
    margin: 40px auto;
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 8px;
}
</style>

{% endblock %}
