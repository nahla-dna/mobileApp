{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javan Rentals</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">

    <!-- Left: Logo -->
    <div class="nav-left">
        <a href="{% url 'home' %}">
            <img src="{% static 'images/logo.png' %}" alt="Javan Rentals Logo">
        </a>
    </div>

    <!-- Center: Navigation Links -->
    <div class="nav-center">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'my_bookings' %}">My Bookings</a>
        <a href="{% url 'information' %}">Information</a>
        <a href="{% url 'about' %}">About Us</a>
    </div>

    <!-- Right: User Section -->
    <div class="nav-right">
        {% if user.is_authenticated %}
            <span class="welcome-text">Hi, {{ user.username }}</span>

            <a href="{% url 'logout' %}" class="btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        {% else %}
            <a href="{% url 'login' %}" class="btn-login">
                <i class="fa-solid fa-user"></i> Login
            </a>

            <a href="{% url 'signup' %}" class="btn-signup">
                Sign Up
            </a>
        {% endif %}
    </div>

</nav>

<!-- MAIN CONTENT -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
